<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>✨Sparkle Seeker✨</title>
     <link rel="stylesheet" href="../../style.css"> <!-- NOTE: SHARED ROOT CSS -->
</head>
<body>
     <canvas id="siteBgCanvas" class="site-bg-canvas" aria-hidden="true"></canvas><!-- NOTE: BACKGROUND SPARKLE CANVAS (shared with homepage) -->
     <div class="body-ody">
          <header>
               <!-- NOTE: MARQUEE + MENU can be grouped into one shared top row so both can scale together. -->
               <div class="header-top">
                    <h1>
                         <a href="../../index.html" class="marquee" id="marquee-sparkleseeker">
                              <span class="marquee-word">Sparkle</span> <span class="marquee-break">Seeker</span>
                         </a>
                    </h1>

                    <div class="dropdown-low">
                         <button
                              class="nav-button"
                              type="button"
                              aria-label="Open navigation menu."
                              aria-expanded="false"
                              aria-controls="navMenu">
                              +
                         </button>

                         <nav id="navMenu" class="nav-menu" aria-label="Main navigation">
                              <ul>
                                   <li><a href="/games/sparkle-seeker/sparkle-seeker.html">Free Trash</a></li>
                                   <li><a href="https://github.com/cgoss-dev" target="_blank" rel="noopener noreferrer">Tiny Crimes</a></li>
                                   <li><a href="https://www.linkedin.com/chrisgoss206" target="_blank" rel="noopener noreferrer">Stalk Me</a></li>
                              </ul>
                         </nav>
                    </div>
               </div>

               <!-- Tagline can stay on its own row below the marquee/menu row. -->
               <div class="hero-blurb">
                    <p class="tagline">
                         Dodge. Collect. Survive.
                    </p>
               </div>
          </header>

          <main class="main-squeeze">
               <div class="game-container">
                    <canvas id="miniGameCanvas" width="480" height="480"></canvas>
               </div>
          </main>
     </div>
     <script src="../../script.js"></script> <!-- LOAD ROOT JS FIRST (menu, marquee, background) -->
     <script type="module" src="./ui.js"></script> <!-- THEN LOAD GAME -->
</body>
</html>
